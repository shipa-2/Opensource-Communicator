name: Build releases

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - videotest
    tags:
      - 'v*'

permissions:
  contents: write

env:
  LIBDATACHANNEL_VERSION: v0.24.5

jobs:
  windows-portable:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]
    defaults:
      run:
        shell: msys2 {0}
    env:
      LIBDATACHANNEL_VERSION: v0.24.5
      PREFIX: /tmp/osc-deps
      BUILD_TYPE: ${{ matrix.build_type }}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-websockets
            mingw-w64-ucrt-x86_64-qt6-multimedia
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-openh264
            mingw-w64-ucrt-x86_64-ffmpeg
            mingw-w64-ucrt-x86_64-openssl
            zip

      - name: Build libdatachannel
        run: |
          set -euo pipefail
          export PATH=/ucrt64/bin:$PATH
          rm -rf /tmp/libdatachannel "$PREFIX"
          git clone --branch "$LIBDATACHANNEL_VERSION" --recurse-submodules \
            https://github.com/paullouisageneau/libdatachannel.git /tmp/libdatachannel
          cmake -S /tmp/libdatachannel -B /tmp/libdatachannel/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DBUILD_SHARED_LIBS=OFF \
            -DENABLE_WARNINGS_AS_ERRORS=OFF \
            -DUSE_GNUTLS=OFF \
            -DUSE_MBEDTLS=OFF \
            -DUSE_NICE=OFF \
            -DNO_EXAMPLES=ON \
            -DNO_TESTS=ON
          cmake --build /tmp/libdatachannel/build
          cmake --install /tmp/libdatachannel/build

      - name: Build application
        run: |
          set -euo pipefail
          export PATH=/ucrt64/bin:$PATH
          export PKG_CONFIG_PATH=/ucrt64/lib/pkgconfig
          cmake -S client -B client/build-win64 -G Ninja \
            -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
            "-DCMAKE_PREFIX_PATH=${PREFIX}:/ucrt64"
          cmake --build client/build-win64

      - name: Package portable ZIP
        run: |
          set -euo pipefail
          export PATH=/ucrt64/bin:$PATH
          VERSION="$(grep -m1 'project(opensource-communicator VERSION' client/CMakeLists.txt | sed -E 's/.*VERSION ([0-9.]+).*/\1/')"
          SUFFIX="win64"
          if [ "$BUILD_TYPE" = "Debug" ]; then
            SUFFIX="win64-debug"
          fi
          STAGE="$GITHUB_WORKSPACE/client/build-win64/portable"
          mkdir -p dist "$STAGE"
          cp client/build-win64/opensource-communicator.exe "$STAGE/"
          # MSYS2 ships release-only Qt, so always deploy release DLLs even for the
          # Debug build (our Debug exe links against the same release Qt runtime).
          windeployqt6 --release --no-translations --no-system-d3d-compiler --no-opengl-sw \
            "$STAGE/opensource-communicator.exe"
          cp /ucrt64/bin/libopus-0.dll "$STAGE/"
          ldd "$STAGE/opensource-communicator.exe" | awk '/\/ucrt64\// {print $3}' | while read -r dll; do
            cp -n "$dll" "$STAGE/" 2>/dev/null || true
          done
          # Qt Multimedia loads its FFmpeg backend as a plugin, so its DLLs are
          # absent from the executable's direct ldd output. Resolve dependencies
          # of every deployed plugin recursively to keep camera/video available.
          for pass in 1 2 3; do
            find "$STAGE" -type f \( -iname '*.exe' -o -iname '*.dll' \) -print0 |
              while IFS= read -r -d '' binary; do
                ldd "$binary" 2>/dev/null | awk '/\/ucrt64\// {print $3}' |
                  while read -r dll; do
                    cp -n "$dll" "$STAGE/" 2>/dev/null || true
                  done
              done
          done
          (cd "$STAGE" && zip -r9 "$GITHUB_WORKSPACE/dist/OpenSource-Communicator-${VERSION}-${SUFFIX}.zip" .)

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-${{ matrix.build_type }}
          path: dist/*.zip
          if-no-files-found: error

  linux-build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]
    env:
      BUILD_TYPE: ${{ matrix.build_type }}
      PREFIX: /tmp/osc-deps
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          # libdatachannel is not packaged in Ubuntu 24.04, it is built from source below.
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            qt6-base-dev \
            qt6-websockets-dev \
            qt6-multimedia-dev \
            libgl1-mesa-dev \
            libssl-dev \
            libopus-dev \
            libopenh264-dev \
            patchelf

      - name: Cache libdatachannel
        id: cache-libdatachannel
        uses: actions/cache@v4
        with:
          path: /tmp/osc-deps
          key: linux-libdatachannel-${{ env.LIBDATACHANNEL_VERSION }}

      - name: Build libdatachannel
        if: steps.cache-libdatachannel.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          rm -rf /tmp/libdatachannel "$PREFIX"
          git clone --branch "$LIBDATACHANNEL_VERSION" --recurse-submodules \
            https://github.com/paullouisageneau/libdatachannel.git /tmp/libdatachannel
          cmake -S /tmp/libdatachannel -B /tmp/libdatachannel/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DBUILD_SHARED_LIBS=OFF \
            -DENABLE_WARNINGS_AS_ERRORS=OFF \
            -DUSE_GNUTLS=OFF \
            -DUSE_MBEDTLS=OFF \
            -DUSE_NICE=OFF \
            -DNO_EXAMPLES=ON \
            -DNO_TESTS=ON
          cmake --build /tmp/libdatachannel/build
          cmake --install /tmp/libdatachannel/build

      - name: Build application
        run: |
          set -euo pipefail
          cmake -S client -B client/build-linux -G Ninja \
            -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
            -DCMAKE_PREFIX_PATH="$PREFIX" \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/dist/AppDir/usr"
          cmake --build client/build-linux -j"$(nproc)"

      - name: Stage tarball
        run: |
          set -euo pipefail
          VERSION="$(grep -m1 'project(opensource-communicator VERSION' client/CMakeLists.txt | sed -E 's/.*VERSION ([0-9.]+).*/\1/')"
          SUFFIX="linux-x86_64"
          if [ "$BUILD_TYPE" = "Debug" ]; then
            SUFFIX="linux-x86_64-debug"
          fi
          cmake --install client/build-linux
          APP="$GITHUB_WORKSPACE/dist/AppDir/usr/bin/opensource-communicator"
          LIBDIR="$GITHUB_WORKSPACE/dist/AppDir/usr/lib"
          mkdir -p "$LIBDIR"
          OPENH264="$(ldd "$APP" | awk '/libopenh264\.so/ {print $3; exit}')"
          test -n "$OPENH264"
          cp -L "$OPENH264" "$LIBDIR/$(basename "$OPENH264")"
          patchelf --set-rpath '$ORIGIN/../lib' "$APP"
          patchelf --print-rpath "$APP"
          mkdir -p dist
          tar -C "$GITHUB_WORKSPACE/dist/AppDir/usr" \
            -czf "dist/OpenSource-Communicator-${VERSION}-${SUFFIX}.tar.gz" .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-${{ matrix.build_type }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    # Publish Release builds after every successful main, videotest, or manual run.
    # Experimental releases use their own tag namespace so they cannot replace main releases.
    if: >-
      always() &&
      needs.windows-portable.result == 'success' &&
      needs.linux-build.result == 'success' &&
      (github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/videotest' ||
       github.event_name == 'workflow_dispatch')
    needs: [windows-portable, linux-build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: '*-Release'
          path: artifacts
          merge-multiple: true

      - name: Prepare release metadata
        id: meta
        run: |
          set -euo pipefail
          # Release timestamp is the UTC time of the commit being built.
          TIMESTAMP="$(TZ=UTC git log -1 --format=%cd --date=format:%d%m%Y-%H%M)"
          APP_VERSION="$(grep -m1 'project(opensource-communicator VERSION' client/CMakeLists.txt | sed -E 's/.*VERSION ([0-9.]+).*/\1/')"
          DAY="${TIMESTAMP:0:2}"
          MONTH="${TIMESTAMP:2:2}"
          YEAR="${TIMESTAMP:4:4}"
          HOUR="${TIMESTAMP:9:2}"
          MINUTE="${TIMESTAMP:11:2}"

          if [ "$GITHUB_REF_NAME" = "videotest" ]; then
            TAG="videotest-${TIMESTAMP}"
            RELEASE_NAME="Сборка ветки videotest от ${DAY}.${MONTH}.${YEAR} ${HOUR}:${MINUTE} (UTC)"
          else
            TAG="${TIMESTAMP}"
            RELEASE_NAME="${TIMESTAMP}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

          {
            echo "## ${RELEASE_NAME}"
            echo
            echo "Сборка приложения **${APP_VERSION}** от ${DAY}.${MONTH}.${YEAR} ${HOUR}:${MINUTE} (UTC)."
            echo
            awk -v ver="$APP_VERSION" '
              /^## \[/ {
                if (found) exit
                if ($0 ~ "\\[" ver "\\]") found = 1
              }
              found { print }
            ' CHANGELOG.md
          } > release-notes.md

          echo "Publishing pre-release assets to ${TAG}:"
          find artifacts -type f -print

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          files: artifacts/**/*
          body_path: release-notes.md
          generate_release_notes: false
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
