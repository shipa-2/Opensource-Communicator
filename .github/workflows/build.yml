name: Build releases

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  LIBDATACHANNEL_VERSION: v0.24.5

jobs:
  windows-portable:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    env:
      LIBDATACHANNEL_VERSION: v0.24.5
      PREFIX: /tmp/osc-deps
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-qt6-websockets
            mingw-w64-ucrt-x86_64-qt6-multimedia
            mingw-w64-ucrt-x86_64-qt6-tools
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-openssl
            zip

      - name: Build libdatachannel
        run: |
          set -euo pipefail
          export PATH=/ucrt64/bin:$PATH
          rm -rf /tmp/libdatachannel "$PREFIX"
          git clone --branch "$LIBDATACHANNEL_VERSION" --recurse-submodules \
            https://github.com/paullouisageneau/libdatachannel.git /tmp/libdatachannel
          cmake -S /tmp/libdatachannel -B /tmp/libdatachannel/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DUSE_GNUTLS=OFF \
            -DUSE_MBEDTLS=OFF \
            -DUSE_NICE=OFF \
            -DNO_EXAMPLES=ON \
            -DNO_TESTS=ON
          cmake --build /tmp/libdatachannel/build
          cmake --install /tmp/libdatachannel/build

      - name: Build application
        run: |
          set -euo pipefail
          export PATH=/ucrt64/bin:$PATH
          export PKG_CONFIG_PATH=/ucrt64/lib/pkgconfig
          cmake -S client -B client/build-win64 -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            "-DCMAKE_PREFIX_PATH=${PREFIX}:/ucrt64"
          cmake --build client/build-win64

      - name: Package portable ZIP
        run: |
          set -euo pipefail
          export PATH=/ucrt64/bin:$PATH
          VERSION="$(grep -m1 'project(opensource-communicator VERSION' client/CMakeLists.txt | sed -E 's/.*VERSION ([0-9.]+).*/\1/')"
          STAGE="$GITHUB_WORKSPACE/client/build-win64/portable"
          mkdir -p dist "$STAGE"
          cp client/build-win64/opensource-communicator.exe "$STAGE/"
          windeployqt6 --no-translations --no-system-d3d-compiler --no-opengl-sw \
            "$STAGE/opensource-communicator.exe"
          cp "$PREFIX/bin/"libdatachannel*.dll "$STAGE/"
          cp /ucrt64/bin/libopus-0.dll "$STAGE/"
          for binary in "$STAGE/opensource-communicator.exe" "$PREFIX/bin/libdatachannel.dll"; do
            ldd "$binary" | awk '/\/ucrt64\/|\/tmp\/osc-deps\// {print $3}' | while read -r dll; do
              cp -n "$dll" "$STAGE/" 2>/dev/null || true
            done
          done
          (cd "$STAGE" && zip -r9 "$GITHUB_WORKSPACE/dist/OpenSource-Communicator-${VERSION}-win64.zip" .)

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: dist/*.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows-portable]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/windows-portable/*
          generate_release_notes: true
